<form class="space-y-8" [formGroup]="aiForm" (ngSubmit)="submit()">

    <!-- BASIC INFORMATION -->

    <div class="card">
        <h3 class="text-md font-bold text-slate-800 mb-6">
            AI System Details
        </h3>

        <div class="grid md:grid-cols-2 gap-6">

            <input class="input-field" placeholder="AI System Name" formControlName="name">

            <input class="input-field" placeholder="Version" formControlName="version">

            <textarea class="input-field md:col-span-2" placeholder="Description" formControlName="description">
</textarea>

        </div>
    </div>


    <!-- OWNERSHIP & DEPLOYMENT -->

    <div class="card">

        <h3 class="text-md font-bold text-slate-800 mb-6">
            Ownership & Deployment
        </h3>

        <div class="grid md:grid-cols-2 gap-6">

            <select class="input-field" formControlName="ownershipType">
                <option value="">Select Ownership</option>
                <option value="OWNED">Owned (In-house)</option>
                <option value="THIRD_PARTY_API">Third Party API</option>
            </select>

            <select class="input-field" formControlName="deploymentType">
                <option value="">Select Deployment</option>
                <option value="CLOUD">Cloud</option>
                <option value="ON_PREM">On Premise</option>
                <option value="HYBRID">Hybrid</option>
            </select>

        </div>

    </div>


    <!-- MODEL DETAILS -->

    <div class="card">

        <h3 class="text-md font-bold text-slate-800 mb-6">
            Model Details
        </h3>

        <div class="grid md:grid-cols-2 gap-6">

            <select class="input-field" formControlName="modelType">
                <option value="">Select Model Type</option>
                <option value="LLM">Large Language Model (LLM)</option>
                <option value="NLP">Natural Language Processing (NLP)</option>
                <option value="CV">Computer Vision (CV)</option>
                <option value="RISK_ENGINE">Risk Engine</option>
                <option value="OTHER">Other</option>
            </select>

            <select class="input-field" formControlName="dataExposureCategory">
                <option value="">Select Data Category</option>
                <option value="GENERIC">Generic Data</option>
                <option value="PERSONAL">Personal Data (PII)</option>
                <option value="FINANCIAL">Financial Data</option>
                <option value="HEALTH">Health Data</option>
            </select>

            <input type="date" class="input-field" formControlName="productionSince">

            <label class="flex items-center gap-2">
                <input type="checkbox" formControlName="businessCritical">
                Business Critical System
            </label>

        </div>

    </div>


    <div class="flex justify-end gap-4">

        <button type="button" class="btn-secondary px-8" (click)="cancel()">
            Cancel
        </button>

        <button type="submit" class="btn-primary px-12 disabled:opacity-50 disabled:cursor-not-allowed"
            [disabled]="aiForm.invalid">
            Register AI System
        </button>

    </div>

</form>
